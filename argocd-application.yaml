apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: testing-argocd
  namespace: argocd
spec:
  project: landingpage
  
  source:
    repoURL: https://github.com/xlp0/LandingPage.git
    targetRevision: HEAD
    path: k8s
  
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
